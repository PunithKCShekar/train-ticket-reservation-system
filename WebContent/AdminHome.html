<!DOCTYPE html>
<html>
<head>
	<meta charset="ISO-8859-1">
	<title>Admin Dashboard | NITRTC</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="UserHome_Css.css">
	<script>
		window.onload = () => {
			const admin = JSON.parse(sessionStorage.getItem('admin'));
			if (!admin) {
				alert('Access Denied. Please login as Admin.');
				window.location.href = 'AdminLogin.html';
			} else {
				document.getElementById('admin-name').innerText = admin.fname;
			}
		};
	</script>
</head>
<body>
	<header>
		<h1 class="hd">Admin Management Portal</h1>
		<nav class="home-container">
			<a href="AdminHome.html" class="menu" style="background: var(--primary);">Home</a>
			<a href="ViewTrains.html" class="menu">View Trains</a>
			<a href="AdminSearchTrain.html" class="menu">Search Trains</a>
			<a href="AddTrains.html" class="menu">Add Train</a>
			<a href="CancleTrain.html" class="menu">Delete Train</a>
			<a href="AdminUpdateTrain.html" class="menu">Update Train</a>
			<a href="AdminLogin.html" class="menu" onclick="sessionStorage.clear()" style="background: rgba(239, 68, 68, 0.1);">Logout</a>
		</nav>
	</header>
	
	<main class="tab" style="max-width: 800px; text-align: left;">
		<div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
			<div style="width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800;">
				A
			</div>
			<div>
				<h2 style="font-size: 1.5rem;">Welcome back, <span id="admin-name" style="color: var(--accent);">Admin</span>!</h2>
				<p style="color: var(--text-muted);">System Control Center Overview</p>
			</div>
		</div>

		<div style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); display: grid; gap: 1.5rem;">
			<div class="menu" style="display: flex; flex-direction: column; align-items: flex-start; padding: 1.5rem;">
				<span style="font-size: 2rem; margin-bottom: 1rem;">🚂</span>
				<span style="color: var(--text-muted); font-size: 0.875rem;">Manage Fleet</span>
				<h3 style="margin-top: 0.5rem;">Train Services</h3>
			</div>
			<div class="menu" style="display: flex; flex-direction: column; align-items: flex-start; padding: 1.5rem;">
				<span style="font-size: 2rem; margin-bottom: 1rem;">📊</span>
				<span style="color: var(--text-muted); font-size: 0.875rem;">Platform Stats</span>
				<h3 style="margin-top: 0.5rem;">Usage Analytics</h3>
			</div>
			<div class="menu" style="display: flex; flex-direction: column; align-items: flex-start; padding: 1.5rem;">
				<span style="font-size: 2rem; margin-bottom: 1rem;">🛡️</span>
				<span style="color: var(--text-muted); font-size: 0.875rem;">Security</span>
				<h3 style="margin-top: 0.5rem;">Access Logs</h3>
			</div>
		</div>
	</main>
</body>
</html>
